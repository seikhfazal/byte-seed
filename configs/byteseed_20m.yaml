# Experimental for RTX 4050 Laptop GPU 6GB VRAM. Reduce batch_size or block_size if CUDA runs out of memory.
model_name: ByteSeed-20M
vocab_size: 8000
block_size: 256
n_layer: 12
n_head: 8
n_embd: 384
dropout: 0.1
batch_size: 4
gradient_accumulation_steps: 8
learning_rate: 3e-4
max_iters: 5000
eval_interval: 250
eval_iters: 50
weight_decay: 0.1
warmup_iters: 200
raw_data_dir: data/raw
processed_data_dir: data/processed
tokenizer_dir: tokenizer
checkpoint_dir: checkpoints
train_split: 0.9
seed: 1337
device: auto
early_stopping_patience: 0

